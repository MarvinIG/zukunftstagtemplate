<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Grundlagen: Formulare und semantische Tags</title>
  </head>
  <body>
    <header>
      <h1>Formulare und semantische Bereiche</h1>
    </header>

    <nav>
      <a href="#formular">Zum Formular</a>
    </nav>

    <main>
      <section id="formular">
        <h2>Einfaches Formular</h2>
        <form>
          <label for="name">Name:</label>
          <input id="name" name="name" type="text" />

          <label for="farbe">Lieblingsfarbe:</label>
          <input id="farbe" name="farbe" type="color" />

          <button type="submit">Absenden</button>
        </form>
      </section>
    </main>

    <footer>
      <p>footer: Hier stehen Infos am Seitenende.</p>
    </footer>
  </body>
</html>
