<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Grundlagen: Links, Bilder und Listen</title>
  </head>
  <body>
    <h1>Links, Bilder und Listen</h1>

    <h2>Link</h2>
    <p>
      <a href="https://de.wikipedia.org" target="_blank">Das ist ein Link zu Wikipedia</a>
    </p>

    <h2>Bild</h2>
    <img
      src="https://picsum.photos/300/180"
      alt="Beispielbild"
      width="300"
      height="180"
    />

    <h2>Ungeordnete Liste</h2>
    <ul>
      <li>Apfel</li>
      <li>Banane</li>
      <li>Erdbeere</li>
    </ul>

    <h2>Geordnete Liste</h2>
    <ol>
      <li>HTML Datei erstellen</li>
      <li>Tags einfügen</li>
      <li>Im Browser öffnen</li>
    </ol>
  </body>
</html>
