<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Grundlagen: Überschriften und Absätze</title>
  </head>
  <body>
    <h1>h1: Das ist die größte Überschrift</h1>
    <h2>h2: Eine kleinere Überschrift</h2>
    <h3>h3: Noch kleiner</h3>

    <p>
      p: Ein Absatz enthält Fließtext. In HTML werden Absätze mit dem
      <code>&lt;p&gt;</code>-Tag geschrieben.
    </p>

    <p>
      <strong>strong:</strong> Macht Text fett und wichtig. <em>em:</em> Betont
      Text kursiv.
    </p>
  </body>
</html>
